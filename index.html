<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr Pepper Tracker</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

        #countCard {
            background: white;
            border-radius: 20px;
            padding: 1.5rem 3rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.15);
            margin-bottom: 1.5rem;
        }

        #countLabel {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #999;
            font-weight: 600;
            margin: 0;
        }

        #count {
            font-family: 'Fredoka One', cursive;
            font-size: 4rem;
            color: #4A90D9;
            margin: 0;
            line-height: 1;
        }

        body {
            background: #EEF4FF;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #4A90D9;
            margin-bottom: 0.5rem;
        }

        #pokemon {
            margin: 1rem 0;
        }

        #mood {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4A90D9;
            margin-bottom: 1rem;
        }

        #logBtn {
            background: #4A90D9;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: transform 0.1s, background 0.2s;
        }

        #logBtn:hover {
            background: #357ABD;
            transform: translateY(-2px);
        }

        #drinksList {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 400px;
        }

        #drinksList li {
            background: white;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.1);
            font-size: 0.9rem;
        }

        #drinksList button {
            background: none;
            border: none;
            color: #CCC;
            cursor: pointer;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        #drinksList button:hover {
            color: #E74C3C;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            50% {
                transform: translateX(10px);
            }

            75% {
                transform: translateX(-10px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .shake {
            animation: shake 0.5s ease;
        }
    </style>

</head>

<body>
    <h1>
        Dr Pepper Tracker
    </h1>

    <div id="pokemon">
        <img id="rioluSprite" src="riolu.gif" width="150" />
    </div>

    <p id="mood">
        Riolu is happy!
    </p>

    <button id="logBtn">
        I just had a Dr Pepper
    </button>

    <div id="countCard">
        <p id="countLabel">today's dr peppers</p>
        <p id="count">0</p>
    </div>

    <ul id="drinksList"></ul>

    <script src="app.js"></script>

</body>

</html>
